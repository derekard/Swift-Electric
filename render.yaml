# Render Blueprint — deploy Swift Electric as a Node web service.
# In Render: New + → Blueprint → pick this repo. Then fill the secret env vars
# (they're set to sync:false so they're entered in the dashboard, not committed).
services:
  - type: web
    name: swift-electric
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_DOMAIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
